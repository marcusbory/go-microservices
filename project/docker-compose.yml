version: "3"

services:
  broker-service:
    build:
      context: ../broker-service
      dockerfile: ../broker-service/broker-service.dockerfile
    restart: always
    ports:
      - "8080:80" # map the container port 80 to the host (ME) port 8080
    deploy:
      mode: replicated
      replicas: 1 # can't listen to multiple ports on the same host
