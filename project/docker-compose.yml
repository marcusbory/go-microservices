version: "3"

services:
  broker-service:
    build:
      context: ../broker-service # folder containing resources
      dockerfile: ../broker-service/broker-service.dockerfile # Dockerfile to use
    restart: always
    ports:
      - "8080:80" # map the container port 80 to the host (ME) port 8080
    deploy:
      mode: replicated
      replicas: 1 # can't listen to multiple ports on the same host

  authentication-service:
    build:
      context: ../authentication-service
      dockerfile: ../authentication-service/authentication-service.dockerfile
    restart: always
    ports:
      - "8082:80" # Docker allows multiple services to listen to the same port (80)
    deploy:
      mode: replicated
      replicas: 1
    environment:
      DSN: >-
        host=postgres port=5432 user=postgres password=postgres dbname=database
        sslmode=disable timezone=UTC connect_timeout=5
    depends_on:
      - postgres
      # NOTE: DSN can be listed in object form (DSN:"...") or list form (- DSN="...")
      # Note: List form cannot have line break - will spoil parsing

      # Host - service connected to
      # Port - port of the service
      # DBname - name of the database
      # SSLmode - SSL mode to connect to the database (disabled because we're not using SSL)
      # Timezone - timezone to use for the database
      # Connect_timeout - timeout to connect to the database

  postgres:
    image: postgres:14.2
    ports:
      - "5432:5432"
    restart: always
    deploy:
      mode: replicated
      replicas: 1
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=database # name of the database, not using users because I want portability
    volumes:
      - ./postgres-data:/var/lib/postgresql/data/ # just keeping it at postgres-data folder

  logger-service:
    build:
      context: ../logger-service
      dockerfile: ../logger-service/logger-service.dockerfile # Dockerfile to use
    restart: always
    # No need ports because logger is used internally by the broker
    deploy:
      mode: replicated
      replicas: 1
    depends_on:
      # does not guarantee readiness of the service
      - mongo

  mongo:
    image: mongo:4.2.16-bionic
    ports:
      - "27017:27017"
    restart: always
    deploy:
      mode: replicated
      replicas: 1
    environment:
      - MONGO_INITDB_DATABASE=logs
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password
    volumes:
      - ./mongo-data:/data/db # just keeping it at mongo-data folder

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"
      - "8025:8025" # web interface: access through localhost:8025
    restart: always
    deploy:
      mode: replicated
      replicas: 1

  mail-service:
    build:
      context: ../mail-service
      dockerfile: ../mail-service/mail-service.dockerfile # Dockerfile to use
    restart: always
    # No need ports because mail is used internally by the broker
    deploy:
      mode: replicated
      replicas: 1
    environment:
      MAIL_DOMAIN: localhost
      MAIL_HOST: mailhog # this is the name of the internal service for mailhog, set above
      MAIL_PORT: 1025
      MAIL_USERNAME: "" # MailHog does not require a username and password
      MAIL_PASSWORD: "" # MailHog does not require a username and password
      MAIL_ENCRYPTION: none
      FROM_NAME: "No-Reply @ Company Name"
      FROM_ADDRESS: "no-reply@mydomain.com" # TODO: Change to your production email address
      # In production, you may use SendGrid or another email service provider
      # Configure SENDGRID API keys here

      # Also, here's a common example of the FROM_* environment variables:
      # FROM_NAME: "Company Name (No Reply)"
      # FROM_ADDRESS: "no-reply@yourcompanydomain.com"
      # Make sure you own the email address, align SPF, DKIM, and DMARC records

      # Might use different variables for production and development, or marketing vs support emails

  rabbitmq:
    image: rabbitmq:3.9-alpine # no need web management portal
    ports:
      - "5672:5672" # default port for RabbitMQ
    restart: always
    deploy:
      mode: replicated
      replicas: 1
    volumes:
      - ./rabbitmq-data:/var/lib/rabbitmq/data # just keeping it at rabbitmq-data folder

  listener-service:
    build:
      context: ../listener-service
      dockerfile: ../listener-service/listener-service.dockerfile # Dockerfile to use
    restart: always
    # No need ports because listener is used internally by the broker
    deploy:
      mode: replicated
      replicas: 1
    depends_on:
      - rabbitmq
