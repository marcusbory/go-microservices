apiVersion: apps/v1
kind: Deployment
metadata:
  name: logger-deployment
  labels:
    app: logger # cosmetic, or for org / filter / tools
spec:
  replicas: 1
  selector:
    matchLabels:
      app: logger # used for service routing
  template:
    metadata:
      labels:
        app: logger # used for service routing
    spec:
      containers:
        - name: logger
          image: marcusbory/logger:latest
          ports:
            - containerPort: 80 # logger listens on :80 inside the container (logger-service/main.go)
            - containerPort: 5001 # RPC port for logger service
            - containerPort: 50001 # gRPC port for logger service

---

apiVersion: v1
kind: Service
metadata:
  name: logger-service # must match the name of the service in the logger-service/
spec:
  selector:
    app: logger # used for service routing (as above)
  ports:
    - protocol: TCP
      name: web-port
      port: 80
      targetPort: 80
    - protocol: TCP
      name: rpc-port
      port: 5001
      targetPort: 5001
    - protocol: TCP
      name: grpc-port
      port: 50001
      targetPort: 50001
  type: ClusterIP # by default, ClusterIP is used

