apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo-deployment
  labels:
    app: mongo # cosmetic, or for org / filter / tools
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongo # used for service routing
  template:
    metadata:
      labels:
        app: mongo # used for service routing
    spec:
      containers:
        - name: mongo
          image: mongo:4.2.16-bionic
          env:
            - name: MONGO_INITDB_DATABASE
              value: logs
            - name: MONGO_INITDB_ROOT_USERNAME
              value: admin
            - name: MONGO_INITDB_ROOT_PASSWORD
              value: password
          ports:
            - containerPort: 27017

---

apiVersion: v1
kind: Service
metadata:
  name: mongo-service
spec:
  selector:
    app: mongo # used for service routing (as above)
  ports:
    - protocol: TCP
      port: 27017
      targetPort: 27017
  type: ClusterIP # by default, ClusterIP is used