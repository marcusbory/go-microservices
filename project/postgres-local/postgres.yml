version: "3"

services:
  postgres-service:
    image: postgres:14.2
    ports:
      - "5432:5432"
    restart: always
    deploy:
      mode: replicated
      replicas: 1
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=database # name of the database, not using users because I want portability
    volumes:
      - ../postgres-data:/var/lib/postgresql/data/ # just keeping it at postgres-data folder
